# Use Redis Cluster as a cache
networks:
  redis-cluster-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:
  redis-master-1:
    image: redis:7-alpine
    container_name: redis-master-1
    networks:
      redis-cluster-net:
        ipv4_address: 172.20.0.11
    command:
      - redis-server
      - --cluster-enabled
      - 'yes'
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - '5000'
      - --appendonly
      - 'yes'
      - --cluster-announce-ip
      - '172.20.0.11'
      - --cluster-announce-port
      - '6379'
      - --cluster-announce-bus-port
      - '16379'
    ports:
      - '6380:6379'
      - '16380:16379'
    volumes:
      - ./devops/redis_cluster/master_1:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-p', '6379', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis-master-2:
